name: Update README OV cards

on:
  schedule:
    - cron: "0 3 * * *" 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true
          path: ov-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6
          path: ov-languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to output branch (Zero-Connection Orphan)
        run: |
          # 1. 临时保存生成的 SVG 文件到内存/缓存区
          mkdir /tmp/assets
          cp ov-stats.svg ov-languages.svg /tmp/assets/
          
          # 2. 彻底清理当前 Git 状态，切换到一个全新的、无历史的分支
          # 使用 git checkout --orphan 后，立即 git rm -rf . 清空所有内容
          git checkout --orphan output-ov-cards
          git rm -rf . > /dev/null
          
          # 3. 把文件搬回来
          cp /tmp/assets/*.svg .
          
          # 4. 提交并强制推送
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update README cards [skip ci]"
          
          # 5. 强制推送覆盖远程
          git push origin output-ov-cards --force
